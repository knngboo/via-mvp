server {
    listen 80;

    # Serve the built React app — fall back to index.html for client-side routing
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; HTML always revalidates
        add_header Cache-Control "public, max-age=31536000, immutable";
        location ~* \.html$ {
            add_header Cache-Control "no-cache";
        }
    }

    # Proxy all /api requests to the backend Express service
    location /api {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # SSE streaming support — required for /api/chat/stream
        # Without these, Nginx buffers the stream and responses appear all-at-once
        proxy_buffering off;
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
    }

    # Enable gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
