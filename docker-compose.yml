# master orchestrator for our full stack architecture
#
services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./backend:/app
    # Dev: auto-reload gunicorn when backend code changes (the volume mount above
    # makes host edits visible). Prevents stale-code surprises after editing .py files.
    command: [ "gunicorn", "--bind", "0.0.0.0:5001", "--worker-class", "gthread", "--workers", "2", "--threads", "4", "--timeout", "360", "--reload", "app:app" ]
    # Secrets come from backend/.env — copy backend/.env.example to backend/.env
    # and fill in your values before running. See .env.example for instructions.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Postgres credentials are safe to hardcode for local dev (never change these).
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=via_mvp
      # US Census ACS key — free public key, safe to share.
      # Free signup: https://api.census.gov/data/key_signup.html
      - CENSUS_API_KEY=${CENSUS_API_KEY:-f805edcf2467e1a44d01133ce2018dae58f3b5cb}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=via_mvp
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-d", "via_mvp", "-U", "admin" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
