name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    name: Backend — lint & smoke tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: via_mvp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d via_mvp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Minimal .env for tests — never commit real secrets
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: via_mvp_test
      POSTGRES_HOST: localhost
      JWT_SECRET: ci-test-jwt-secret-min-16-chars
      ADMIN_SECRET: ci-test-admin
      OPENAI_API_KEY: sk-test-placeholder
      NODE_ENV: test
      PORT: 5001

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Apply DB schema
        working-directory: backend
        run: |
          PGPASSWORD=testpass psql -h localhost -U admin -d via_mvp_test -f db/init.sql

      - name: Start backend (background)
        working-directory: backend
        run: |
          npm start &
          # Wait for the backend to be ready
          for i in {1..20}; do
            curl -sf http://localhost:5001/health && break
            echo "Waiting for backend... ($i)"
            sleep 2
          done

      - name: Run smoke tests
        working-directory: backend
        env:
          TEST_BASE_URL: http://localhost:5001
          ADMIN_SECRET: ci-test-admin
        run: npm test

  frontend-build:
    name: Frontend — install & build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend (production bundle)
        working-directory: frontend
        run: npm run build
        env:
          # Vite needs this to not fail on missing env vars at build time
          VITE_API_URL: http://localhost:5001
